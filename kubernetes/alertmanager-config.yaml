apiVersion: v1
kind: ConfigMap
metadata:
  name: alertmanager-config
  namespace: monitoring
data:
  alertmanager.yaml: |
    global:
      resolve_timeout: 5m

    route:
      receiver: 'default-webhook'
      group_by: ['alertname', 'namespace', 'severity']
      group_wait: 10s
      group_interval: 10s
      repeat_interval: 1h

      routes:
      - match:
          incident_type: pod_crash
        receiver: 'remediation-webhook'
        continue: true

      - match:
          incident_type: pod_not_ready
        receiver: 'remediation-webhook'
        continue: true

      - match:
          incident_type: high_cpu
        receiver: 'remediation-webhook'
        continue: true

      - match:
          incident_type: high_memory
        receiver: 'remediation-webhook'
        continue: true

    receivers:
    - name: 'default-webhook'
      webhook_configs:
      - url: 'http://remediation-service.default.svc.cluster.local:5000/alert'
        send_resolved: true

    - name: 'remediation-webhook'
      webhook_configs:
      - url: 'http://remediation-service.default.svc.cluster.local:5000/alert'
        send_resolved: true